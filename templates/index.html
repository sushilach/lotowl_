<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LotOwl Parking Availability</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
</head>
<body>
  <div id="app">
    <div id="landing" class="landing-screen">
      <div class="landing-card">
        <p class="app-label">Smart Parking</p>
        <p class="hero-title">Find available parking faster</p>
        <p class="hero-subtitle">Quickly locate open spots and drive smarter.</p>
        <div class="landing-image-wrap">
          <img class="landing-image" src="/static/img/owl.png" alt="LotOwl mascot" />
        </div>
        <button id="advance-btn" class="advance-btn" onclick="startApp()">Open Map</button>
      </div>
    </div>

    <div id="main-screen" class="hidden">
      <div class="top-nav">
        <input id="search-input" class="search-box" type="search" placeholder="🔍 Search parking" aria-label="Search parking" />
        <button class="menu-btn" aria-label="App owl">🦉</button>
      </div>
      <div class="content-wrap">
        <div id="map" aria-label="Parking map" role="img"></div>
        <div id="lot-summary" class="lot-summary">
          <div class="summary-row"><strong id="summary-lot-name">M70 Parking Lot</strong></div>
          <div class="summary-row">Total spots: <span id="summary-total">50</span></div>
          <div class="summary-row">Spots taken: <span id="summary-taken">18</span></div>
          <div class="summary-row">Available: <span id="summary-available">32</span></div>
          <button id="navigate-btn" class="directions-btn" style="margin-top:12px;">Navigate</button>
          <button id="end-nav-btn" class="directions-btn" style="margin-top:10px; display:none; background:#ef4444;">End Navigation</button>
        </div>
        <div id="legend" class="legend-card hidden">
          <div class="legend-item"><span class="dot dot-available"></span> Available</div>
          <div class="legend-item"><span class="dot dot-limited"></span> Almost Full</div>
          <div class="legend-item"><span class="dot dot-full"></span> Full</div>
        </div>
      </div>
      <div id="modal-backdrop" class="modal-backdrop hidden"></div>
      <div id="modal" class="modal-card hidden" aria-live="polite">
        <div class="modal-header">
          <div>
            <p id="lot-name" class="lot-name">Lot A</p>
            <p id="lot-address" class="lot-address">123 Main St</p>
          </div>
          <button id="close-modal" class="close-btn" aria-label="Close lot details">✕</button>
        </div>
        <div class="status-row">
          <span id="lot-status" class="status-badge status-available">Available</span>
          <span id="lot-distance" class="lot-distance">0.4 mi away</span>
        </div>
        <div class="details-grid">
          <div class="detail-block"><span class="detail-label">Available</span><strong id="lot-available">45</strong></div>
          <div class="detail-block"><span class="detail-label">Total</span><strong id="lot-total">120</strong></div>
          <div class="detail-block"><span class="detail-label">Distance</span><strong id="lot-distance-val">0.4 mi</strong></div>
        </div>
        <button id="directions-btn" class="directions-btn">Get Directions</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
  <script>
    // ----------------------
    // MAP SETUP
    // ----------------------
    var map;

    // Navigation to M70
    let routingControl;
    let selectedLot = { lat: 41.108307, lng: -80.652153, name: 'M70 Parking Lot' };
    function navigateToSelectedLot() {
      const destLat = selectedLot.lat;
      const destLng = selectedLot.lng;
      if (!navigator.geolocation) {
        alert('Geolocation is not supported by your browser.');
        return;
      }
      navigator.geolocation.getCurrentPosition(function(pos) {
        const userLat = pos.coords.latitude;
        const userLng = pos.coords.longitude;
        if (routingControl) {
          map.removeControl(routingControl);
        }
        routingControl = L.Routing.control({
          waypoints: [
            L.latLng(userLat, userLng),
            L.latLng(destLat, destLng)
          ],
          routeWhileDragging: false,
          show: false,
          addWaypoints: false,
          draggableWaypoints: false,
          fitSelectedRoutes: true,
          createMarker: function() { return null; }
        }).addTo(map);
        // Show End Navigation button
        var endBtn = document.getElementById('end-nav-btn');
        if (endBtn) endBtn.style.display = '';
        var navBtn = document.getElementById('navigate-btn');
        if (navBtn) navBtn.style.display = 'none';
      }, function() {
        alert('Could not get your location.');
      });
    }

    function endNavigation() {
      if (routingControl) {
        map.removeControl(routingControl);
        routingControl = null;
      }
      var endBtn = document.getElementById('end-nav-btn');
      if (endBtn) endBtn.style.display = 'none';
      var navBtn = document.getElementById('navigate-btn');
      if (navBtn) navBtn.style.display = '';
    }

    function initLeafletMap() {
      map = L.map('map').setView([41.1078, -80.6465], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      const lots = [
        { id:'M70', name:'M70 Parking Lot', lat:41.108307, lng:-80.652153, total:50, taken:0, info:'YSU M70 Lot' },
        { id:'M30', name:'M30 Parking Deck', lat:41.1075, lng:-80.6478, total:34, taken:22, info:'Student Deck' },
        { id:'Wick', name:'Wick Avenue Deck', lat:41.1068, lng:-80.6460, total:45, taken:40, info:'Student Deck' },
        { id:'M24', name:'M24 Parking Lot', lat:41.1064, lng:-80.6490, total:30, taken:23, info:'Student Lot' },
        { id:'M21', name:'M21 Parking Lot', lat:41.1081, lng:-80.6440, total:28, taken:19, info:'Student Lot' },
        { id:'M18', name:'M18 Parking Lot', lat:41.1091, lng:-80.6455, total:35, taken:32, info:'Student Lot' }
      ];

      // Define API base URL for easy switching
      const API = "http://127.0.0.1:8000";
      // Fetch M70 data from backend and update the lots array
      fetch(`/lots/M70`)
        .then(res => res.json())
        .then(data => {
          console.debug('Initial M70 fetch:', data);
          const m70 = lots.find(lot => lot.id === "M70");
          if (m70) {
            // Map backend fields to frontend
            m70.total = data.max_capacity;
            m70.taken = data.occupied_count;
            updateSummary(m70); // refresh the UI
            console.debug('Updated summary for M70:', { total: m70.total, taken: m70.taken });
          }
        })
        .catch(err => console.error("Failed to fetch M70 data:", err));

      function updateSummary(lot) {
        document.getElementById('summary-lot-name').textContent = lot.name;
        document.getElementById('summary-total').textContent = lot.total;
        document.getElementById('summary-taken').textContent = lot.taken;
        document.getElementById('summary-available').textContent = lot.total - lot.taken;
        selectedLot = lot;
      }

      function getMarkerIcon(color) {
        return new L.Icon({
          iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
          shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
          iconSize: [25, 41],
          iconAnchor: [12, 41],
          popupAnchor: [1, -34],
          shadowSize: [41, 41]
        });
      }

      function createLotMarker(lot, idx) {
        let color = 'green';
        if (lot.id === 'M70') {
          const available = lot.total - lot.taken;
          if (available > 25) {
            color = 'green';
          } else if (available < 15 && available > 0) {
            color = 'blue';
          } else if (available <= 0) {
            color = 'red';
          }
        } else if (idx % 2 === 0) {
          color = 'green';
        } else {
          color = 'red';
        }

        const marker = L.marker([lot.lat, lot.lng], {
          icon: getMarkerIcon(color)
        }).addTo(map);

        marker.bindPopup(`<b>${lot.name}</b><br>Available: ${lot.total - lot.taken}<br><i>${lot.info}</i>`);
        marker.on('click', () => {
          marker.setPopupContent(
            `<b>${lot.name}</b><br>Available: ${lot.total - lot.taken}<br><i>${lot.info}</i>`
          );
          updateSummary(lot);
        });
        marker.on('popupopen', () => updateSummary(lot));
        return marker;
      }

      const markers = lots.map((lot, idx) => ({ ...lot, marker: createLotMarker(lot, idx) }));
      updateSummary(lots[0]);

      // Poll backend for M70 updates and refresh UI/marker every 3 seconds
      setInterval(function() {
        fetch(`/lots/M70`)
          .then(res => res.json())
          .then(data => {
            console.debug('M70 poll received:', data);
            const m70 = lots.find(lot => lot.id === "M70");
            if (!m70) return;
            // update values
            m70.total = data.max_capacity;
            m70.taken = data.occupied_count;

            // update summary panel
            updateSummary(m70);

            console.debug('Summary updated:', { total: m70.total, taken: m70.taken, available: m70.total - m70.taken });

            // update marker popup and icon color
            const markerEntry = markers.find(m => m.id === 'M70');
            if (markerEntry && markerEntry.marker) {
              const available = m70.total - m70.taken;
              markerEntry.marker.setPopupContent(`<b>${m70.name}</b><br>Available: ${available}<br><i>${m70.info}</i>`);

              console.debug('Marker popup updated for M70, available=', available);

              // decide color based on availability
              let newColor = 'green';
              if (available > 25) newColor = 'green';
              else if (available < 15 && available > 0) newColor = 'blue';
              else if (available <= 0) newColor = 'red';

              // replace icon if changed
              const currentIconUrl = markerEntry.marker.options.icon?.options?.iconUrl || '';
              const desiredIconUrl = `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${newColor}.png`;
              if (currentIconUrl !== desiredIconUrl) {
                markerEntry.marker.setIcon(getMarkerIcon(newColor));
              }
            }
          })
          .catch(err => {
            // don't spam console, but log occasional failures
            console.debug('M70 poll failed:', err);
          });
      }, 3000);

      function searchLot(query) {
        const normalized = query.trim().toLowerCase();
        if (!normalized) return;
        const found = markers.find((lot) => lot.name.toLowerCase().includes(normalized) || lot.id.toLowerCase().includes(normalized));
        if (found) {
          map.setView([found.lat, found.lng], 16);
          found.marker.openPopup();
          updateSummary(found);
        }
      }

      const searchInput = document.getElementById('search-input');
      searchInput?.addEventListener('input', (e) => {
        const query = e.target.value;
        if (!query) return;
        searchLot(query);
      });
    }

    function startApp() {
      try { localStorage.setItem('lotowl_session', '1'); } catch (e) { /* ignore */ }
      document.getElementById('landing').classList.add('hidden');
      document.getElementById('main-screen').classList.remove('hidden');
      document.getElementById('legend').classList.remove('hidden');
      setTimeout(initLeafletMap, 50);
      // Attach navigation button handler
      setTimeout(function() {
        var navBtn = document.getElementById('navigate-btn');
        if (navBtn) navBtn.onclick = navigateToSelectedLot;
        var endBtn = document.getElementById('end-nav-btn');
        if (endBtn) endBtn.onclick = endNavigation;
      }, 200);
    }

    document.getElementById('advance-btn')?.addEventListener('click', startApp);

  </script>
  <script src="/static/js/modal.js"></script>
  <script src="/static/js/map.js"></script>
</body>
</html>
